<!DOCTYPE html>
<html lang="en">
<head>
<title>Booking Page</title>
<meta charset="utf-8">
</head>
<body>
	<form>
		<label for="bname">Band name<label><br>
		<input type="text" id="bname" name="bname"><br><br>
		<label for="num">Number of band numbers<label><br>
		<input type="number" id="num" name="num"><br><br>
		<label for="bemail">Email to contact your band<label><br>
		<input type="email" id="bemail" name="bemail"><br><br>
		<label for="dates">Date(s) requested<label><br>
		<input type="text" id="dates" name="dates"><br><br>
		<label for="genre">Genre/style of music<label><br>
		<input type="text" id="genre" name="genre"><br><br>
		<label for="link">Link to music<label><br>
		<input type="url" id="link" name="link"><br><br>
		<label for="adtl">Additional requests/information<label><br>
		<input type="text" id="adtl" name="adtl"><br><br>
		<input type="button" value="Submit">
	</form>
	<br><br>
	<a href="thankyou.html">Thank you</a>
</body>
</html>
